<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Resume</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #1a1a1a;
    line-height: 1.5;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-size: 11px; /* Optimal for A4 PDF */
  }
  .container {
    width: 100%;
    max-width: 800px;
    margin: 0 auto;
    padding: 20px 40px;
  }
  header {
    text-align: center;
    margin-bottom: 16px;
    border-bottom: 1px solid #e5e7eb;
    padding-bottom: 16px;
  }
  h1 {
    font-size: 24px;
    font-weight: 700;
    margin: 0 0 4px 0;
    color: #111827;
    letter-spacing: -0.5px;
  }
  .title {
    font-size: 13px;
    font-weight: 600;
    color: #4b5563;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .contact-info {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 12px;
    font-size: 10.5px;
    color: #6b7280;
  }
  .contact-info a {
    color: #2563eb;
    text-decoration: none;
  }
  section {
    margin-bottom: 16px;
  }
  h2 {
    font-size: 14px;
    font-weight: 700;
    color: #111827;
    text-transform: uppercase;
    border-bottom: 1px solid #e5e7eb;
    padding-bottom: 4px;
    margin: 0 0 10px 0;
    letter-spacing: 0.5px;
  }
  p.summary {
    margin: 0 0 12px 0;
    text-align: justify;
    line-height: 1.6;
  }
  .skills-grid {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 4px 12px;
    margin-bottom: 12px;
  }
  .skill-category {
    font-weight: 600;
    color: #374151;
  }
  .experience-item {
    margin-bottom: 12px;
  }
  .exp-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 2px;
  }
  .exp-title {
    font-weight: 700;
    font-size: 12px;
    color: #111827;
  }
  .exp-company {
    font-weight: 600;
    color: #4b5563;
  }
  .exp-date-loc {
    font-size: 10.5px;
    color: #6b7280;
    text-align: right;
  }
  ul {
    margin: 4px 0 0 0;
    padding-left: 18px;
  }
  li {
    margin-bottom: 3px;
    line-height: 1.5;
  }
  .edu-item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .edu-degree {
    font-weight: 600;
    color: #111827;
  }
  .edu-school {
    color: #4b5563;
  }
  .cert-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
  }
  .cert-item {
    position: relative;
    padding-left: 10px;
  }
  .cert-item::before {
    content: "•";
    position: absolute;
    left: 0;
    color: #111827;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>{{name}}</h1>
    <div class="title">{{title}}</div>
    <div class="contact-info">
      <span>📍 {{location}}</span>
      <span>|</span>
      <span>✉️ <a href="mailto:{{email}}">{{email}}</a></span>
      <span>|</span>
      <span>📱 {{phone}}</span>
      <span>|</span>
      <span>🔗 <a href="{{linkedin}}">LinkedIn</a></span>
      <span>|</span>
      <span>💻 <a href="{{github}}">GitHub</a></span>
    </div>
  </header>

  <section>
    <h2>Professional Summary</h2>
    <p class="summary">{{summary}}</p>
  </section>

  <section>
    <h2>Technical Skills</h2>
    <div class="skills-grid">
      {{skills_html}}
    </div>
  </section>

  <section>
    <h2>Professional Experience</h2>
    {{experience_html}}
  </section>

  <section>
    <h2>Education</h2>
    {{education_html}}
  </section>

  <section>
    <h2>Certifications</h2>
    <div class="cert-grid">
      {{certifications_html}}
    </div>
  </section>
</div>
</body>
</html>
