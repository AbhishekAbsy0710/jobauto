# ── Deal-breakers (auto-skipped before evaluation) ─────────────────────────
deal_breakers:
  - US citizenship required
  - active security clearance
  - no remote
  - must be located in office
  - 100% on-site
  - relocation required
  - defense contractor
  - require visa sponsorship to work in the US

# ── Role filter — only import these title keywords from portals ─────────────
filter_keywords:
  - DevOps
  - Cloud
  - Infrastructure
  - Platform
  - Backend
  - Full Stack
  - FullStack
  - Data Engineer
  - AI Engineer
  - ML Engineer
  - SRE
  - Site Reliability
  - Software Engineer
  - Data Analyst
  - Data Scientist
  - Solutions Engineer
  - Systems Engineer
  - Reliability Engineer
  - Staff Engineer
  - Principal Engineer
