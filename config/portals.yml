# ── Deal-breakers (these will be auto-skipped) ─────────────────────────────
deal_breakers:
  - require visa sponsorship to work in
  - US citizenship required
  - active security clearance
  - no remote
  - must be located in office
  - 100% on-site
  - relocation required
  - defense contractor

