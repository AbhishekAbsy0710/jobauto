name: Scrape Jobs

on:
  schedule:
    # Three daily runs — 45 min before each auto-apply run
    # Shifted OFF the top of the hour to avoid GitHub cron congestion
    - cron: '32 5 * * *'       # ~7:32 AM Berlin (before morning apply)
    - cron: '38 9 * * *'       # ~11:38 AM Berlin (before noon apply)
    - cron: '2 14 * * *'       # ~4:02 PM Berlin (before afternoon apply)
  workflow_dispatch:  # allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write .env
        run: |
          cat > .env << 'ENVEOF'
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY=${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY=${{ secrets.SAMBANOVA_API_KEY }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          ENVEOF

      - name: Scrape jobs → Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node src/scripts/scrape-to-supabase.js

      - name: Summary
        if: always()
        run: |
          echo "✅ Scrape complete — jobs upserted to Supabase"
          echo "Auto-apply will pick them up in 15 minutes"
