name: Scrape Jobs

on:
  schedule:
    # Run at 5:45 AM Berlin time (UTC+2) Mon–Fri — 15 min before auto-apply
    - cron: '45 3 * * 1-5'
  workflow_dispatch:  # allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write .env
        run: |
          cat > .env << 'ENVEOF'
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          ENVEOF

      - name: Scrape jobs → Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node src/scripts/scrape-to-supabase.js

      - name: Summary
        if: always()
        run: |
          echo "✅ Scrape complete — jobs upserted to Supabase"
          echo "Auto-apply will pick them up in 15 minutes"
