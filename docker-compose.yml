services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: jobauto-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=Europe/Berlin
      - TZ=Europe/Berlin
      - N8N_SECURE_COOKIE=false
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - jobauto-net

volumes:
  n8n_data:

networks:
  jobauto-net:
    driver: bridge
